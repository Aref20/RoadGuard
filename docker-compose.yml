version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: speedalert
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=speedalert;Username=postgres;Password=password
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=SuperSecretKeyThatIsAtLeast32CharsLongForDev!
      - Jwt__Issuer=speedalert-api
      - Jwt__Audience=speedalert-mobile
    depends_on:
      - db

volumes:
  pgdata:
