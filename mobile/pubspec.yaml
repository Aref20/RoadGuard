name: speed_alert
description: "Hands-free driving safety assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  geolocator: ^11.0.0
  flutter_background_service: ^3.0.0
  flutter_activity_recognition: ^3.0.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.4.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  audioplayers: ^6.0.0
  vibration: ^1.8.3
  flutter_local_notifications: ^17.1.1
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
